name: REST Assured API Tests

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  api-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Run tests with Maven
      run: mvn clean test
      
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages
        
    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: target/allure-results
        allure_history: allure-history
        keep_reports: 20
        
    - name: Deploy Allure report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
        
    - name: Upload Allure results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: target/allure-results
        retention-days: 30
        
    - name: Upload Allure report as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-history
        retention-days: 30
        
    - name: Upload Surefire reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports
        path: target/surefire-reports
        retention-days: 30
        
    - name: Test Report Summary
      if: always()
      run: |
        echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -d "target/surefire-reports" ]; then
          echo "### Test Results:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          find target/surefire-reports -name "TEST-*.xml" -exec grep -h "testsuite" {} \; | head -5 | while read line; do
            tests=$(echo $line | grep -oP 'tests="\K[^"]+')
            failures=$(echo $line | grep -oP 'failures="\K[^"]+')
            errors=$(echo $line | grep -oP 'errors="\K[^"]+')
            name=$(echo $line | grep -oP 'name="\K[^"]+')
            echo "- **$name**: $tests tests, $failures failures, $errors errors" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All test artifacts uploaded successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No test results found" >> $GITHUB_STEP_SUMMARY
        fi
